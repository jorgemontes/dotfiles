name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck on install.sh
        run: shellcheck install.sh

  test-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: dotfiles

      - name: Move repo to ~/dotfiles (mirrors real usage)
        run: |
          cp -r "$GITHUB_WORKSPACE/dotfiles" "$HOME/dotfiles"

      - name: Install prerequisites
        run: sudo apt-get install -y stow zsh vim neofetch git curl

      - name: Install Oh My Zsh
        run: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended

      - name: Install Powerlevel10k
        run: git clone --depth=1 https://github.com/romkatv/powerlevel10k.git "$HOME/.oh-my-zsh/custom/themes/powerlevel10k"

      - name: Stow all packages
        run: |
          cd "$HOME/dotfiles"
          for pkg in zsh vim neofetch p10k; do
            echo "==> stow $pkg"
            stow "$pkg"
          done

      - name: Verify symlinks
        run: |
          errors=0
          check_link() {
            if [ ! -L "$1" ]; then
              echo "FAIL: $1 is not a symlink"
              errors=$((errors + 1))
            else
              echo "OK:   $1 -> $(readlink "$1")"
            fi
          }
          check_link "$HOME/.zshrc"
          check_link "$HOME/.vimrc"
          check_link "$HOME/.p10k.zsh"
          check_link "$HOME/.config/neofetch/config.conf"
          if [ "$errors" -gt 0 ]; then
            echo "$errors symlink(s) missing"
            exit 1
          fi

      - name: Verify dotfile contents
        run: |
          echo "==> .zshrc contains oh-my-zsh"
          grep -q 'oh-my-zsh' "$HOME/.zshrc"
          echo "==> .vimrc contains syntax on"
          grep -q 'syntax on' "$HOME/.vimrc"
          echo "==> .p10k.zsh is non-empty"
          test -s "$HOME/.p10k.zsh"
          echo "==> neofetch config has print_info"
          grep -q 'print_info' "$HOME/.config/neofetch/config.conf"
          echo "All content checks passed"

      - name: Verify zsh can source .zshrc
        run: zsh -c 'source "$HOME/.zshrc"' || true
